name: nightly

on:
  schedule:
    - cron: "17 7 * * *"   # 07:17 UTC daily
  workflow_dispatch:

jobs:
  strict:
    name: pluginval strict
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.94.0"
      - uses: Swatinem/rust-cache@v2
      - name: bundle universal
        run: cargo xtask bundle-universal rack-plugin --release
      - name: install pluginval
        run: |
          mkdir -p pluginval
          curl -L -o pluginval.zip https://github.com/Tracktion/pluginval/releases/latest/download/pluginval_macOS.zip
          unzip -oq pluginval.zip -d pluginval
      - name: pluginval strictness 10 (VST3 only; CLAP uses clap-validator)
        run: |
          PV=./pluginval/pluginval.app/Contents/MacOS/pluginval
          $PV --strictness-level 10 --validate-in-process --validate target/bundled/rack-plugin.vst3
      - name: install clap-validator
        run: |
          mkdir -p clap-validator
          curl -L -o clap-validator.tar.gz https://github.com/free-audio/clap-validator/releases/download/0.3.2/clap-validator-0.3.2-macos-universal.tar.gz
          tar -xzf clap-validator.tar.gz -C clap-validator --strip-components=1
          chmod +x ./clap-validator/clap-validator
          ./clap-validator/clap-validator --version
      - name: clap-validator (CLAP, full test suite)
        # Nightly runs the full suite (no --only-failed) so we get a
        # complete report in the logs; exit code still gates the job.
        run: ./clap-validator/clap-validator validate target/bundled/rack-plugin.clap
      - uses: actions/upload-artifact@v7
        with:
          name: nightly-bundled-universal
          path: target/bundled/
