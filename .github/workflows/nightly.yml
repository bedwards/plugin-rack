name: nightly

on:
  schedule:
    - cron: "17 7 * * *"   # 07:17 UTC daily
  workflow_dispatch:

jobs:
  strict:
    name: pluginval strict
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.94.0"
      - uses: Swatinem/rust-cache@v2
      - name: bundle universal
        run: cargo xtask bundle-universal rack-plugin --release
      - name: install pluginval
        run: |
          mkdir -p pluginval
          curl -L -o pluginval.zip https://github.com/Tracktion/pluginval/releases/latest/download/pluginval_macOS.zip
          unzip -oq pluginval.zip -d pluginval
      - name: pluginval strictness 10 (VST3 only; CLAP uses clap-validator)
        run: |
          PV=./pluginval/pluginval.app/Contents/MacOS/pluginval
          $PV --strictness-level 10 --validate-in-process --validate target/bundled/rack-plugin.vst3
      - name: install clap-validator
        run: |
          mkdir -p clap-validator
          curl -L -o clap-validator.tar.gz https://github.com/free-audio/clap-validator/releases/download/0.3.2/clap-validator-0.3.2-macos-universal.tar.gz
          tar -xzf clap-validator.tar.gz -C clap-validator --strip-components=1
          chmod +x ./clap-validator/clap-validator
          ./clap-validator/clap-validator --version
      - name: clap-validator (CLAP, full test suite)
        # Nightly runs the full suite (no --only-failed) so we get a
        # complete report in the logs; exit code still gates the job.
        run: ./clap-validator/clap-validator validate target/bundled/rack-plugin.clap
      - uses: actions/upload-artifact@v7
        with:
          name: nightly-bundled-universal
          path: target/bundled/

  verify-render:
    # Tier 5a: offline bit-identical passthrough render.
    # Renders a deterministic 2 s 48 kHz stereo signal through the
    # bundled VST3 and asserts INPUT == OUTPUT (np.array_equal). Valid
    # only while rack-plugin is a literal passthrough; when real DSP
    # lands, the script's assertion has to loosen.
    #
    # macOS-only: DawDreamer wheels are most reliable on macOS. Python
    # pinned to 3.12 because DawDreamer 0.7+ has cp311/cp312 wheels only.
    name: verify-render (bit-identical passthrough)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.94.0"
      - uses: Swatinem/rust-cache@v2
      - uses: astral-sh/setup-uv@v7
      - name: bundle release (arm64 host slice)
        run: cargo xtask bundle rack-plugin --release
      - name: verify_render.py — INPUT == OUTPUT, bit-identical
        # `uv run --script` activates the script's PEP-723 inline deps
        # (dawdreamer, numpy, soundfile) — no project sync needed.
        run: uv run --python 3.12 --script scripts/verify_render.py

  verify-bitwig-mod:
    # Tier 5c: offline Bitwig-style verification via DawDreamer.
    # macOS-only for now — DawDreamer wheels are most reliable on
    # macOS + Linux; Windows wheels are spotty. We build + render on
    # macos-15 (Apple Silicon) here. Bundled output is *not* universal
    # for this job — arm64 arm-slice is enough for DawDreamer to load.
    name: bitwig-mod (variable block + macro ramp)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.94.0"
      - uses: Swatinem/rust-cache@v2
      - uses: astral-sh/setup-uv@v7
      - name: bundle release (arm64 host slice)
        run: cargo xtask bundle rack-plugin --release
      - name: pluginrack verify bitwig-mod
        # `uv sync --extra verify` installs dawdreamer + numpy; skip the
        # dev group so nightly stays lean. The subcommand itself late-
        # imports dawdreamer so --help works without the extras.
        #
        # Python is pinned to 3.12 here because DawDreamer's PyPI wheels
        # at v0.8.x are cp311 / cp312 only — cp313 is not yet published.
        # When DawDreamer publishes 3.13 wheels, drop the `--python 3.12`
        # flag and let uv pick the default.
        working-directory: pluginrack
        run: |
          uv sync --python 3.12 --extra verify
          uv run --python 3.12 pluginrack verify bitwig-mod
