name: automerge

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]
  check_suite:
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    runs-on: ubuntu-24.04
    if: github.event.pull_request.draft == false || github.event_name == 'check_suite'
    steps:
      - uses: actions/checkout@v4
      - name: Enable auto-merge for ready, reviewed, non-draft PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # On pull_request_target, we know the PR number directly.
          # On check_suite, iterate linked PRs.
          if [ "${{ github.event_name }}" = "pull_request_target" ]; then
            nums="${{ github.event.pull_request.number }}"
          else
            nums=$(gh api "${{ github.event.check_suite.pull_requests_url }}" --jq '.[].number' || true)
          fi
          for n in $nums; do
            gh pr merge "$n" --auto --squash --delete-branch --repo ${{ github.repository }} || true
          done
