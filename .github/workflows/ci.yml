name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: rust / ${{ matrix.runner }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            pluginval_url: https://github.com/Tracktion/pluginval/releases/latest/download/pluginval_macOS.zip
            pluginval_bin: ./pluginval/pluginval.app/Contents/MacOS/pluginval
            clap_validator_url: https://github.com/free-audio/clap-validator/releases/download/0.3.2/clap-validator-0.3.2-macos-universal.tar.gz
            clap_validator_archive: clap-validator.tar.gz
            clap_validator_bin: ./clap-validator/clap-validator
          - runner: ubuntu-24.04
            pluginval_url: https://github.com/Tracktion/pluginval/releases/latest/download/pluginval_Linux.zip
            pluginval_bin: ./pluginval/pluginval
            clap_validator_url: https://github.com/free-audio/clap-validator/releases/download/0.3.2/clap-validator-0.3.2-ubuntu-18.04.tar.gz
            clap_validator_archive: clap-validator.tar.gz
            clap_validator_bin: ./clap-validator/clap-validator
          - runner: windows-2025
            pluginval_url: https://github.com/Tracktion/pluginval/releases/latest/download/pluginval_Windows.zip
            pluginval_bin: ./pluginval/pluginval.exe
            clap_validator_url: https://github.com/free-audio/clap-validator/releases/download/0.3.2/clap-validator-0.3.2-windows.zip
            clap_validator_archive: clap-validator.zip
            clap_validator_bin: ./clap-validator/clap-validator.exe
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.94.0"
          components: rustfmt,clippy

      - name: Linux deps (ALSA, X11)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libasound2-dev libx11-xcb-dev libxcb-dri2-0-dev \
            libxcb-icccm4-dev libxcursor-dev libxkbcommon-dev libgl1-mesa-dev \
            libxcb-randr0-dev libxcb-render-util0-dev libxcb-shape0-dev \
            libxcb-xkb-dev libxkbcommon-x11-dev

      - uses: Swatinem/rust-cache@v2

      - name: fmt + clippy
        run: |
          cargo fmt --all --check
          cargo clippy --workspace --all-targets -- -D warnings

      - name: test
        run: cargo test --workspace

      - name: bundle release
        shell: bash
        run: cargo xtask bundle rack-plugin --release

      - name: Install pluginval
        shell: bash
        run: |
          mkdir -p pluginval
          curl -L -o pluginval.zip "${{ matrix.pluginval_url }}"
          unzip -oq pluginval.zip -d pluginval

      # pluginval (JUCE-based, v1.0.x) does not support CLAP.
      # CLAP validation runs via clap-validator below.
      - name: pluginval (VST3, strictness 5)
        shell: bash
        # All CI runners are headless — skip GUI tests everywhere.
        # baseview cannot create an OpenGL context without a display and
        # will abort pluginval's Editor test. Full GUI validation lives
        # in nightly.yml on a proper runner.
        run: ${{ matrix.pluginval_bin }} --strictness-level 5 --validate-in-process --skip-gui-tests --validate target/bundled/rack-plugin.vst3

      # --- CLAP validation via free-audio/clap-validator ---
      # Version pinned to 0.3.2 (latest stable as of 2026-04) for CI
      # reproducibility; do not move to a floating tag. Upstream bumps
      # are their own PR.
      - name: Install clap-validator
        shell: bash
        # 0.3.2 release archive layouts differ per OS:
        #   - macOS  .tar.gz: `binaries/clap-validator`  (needs --strip-components=1)
        #   - Linux  .tar.gz: `clap-validator`           (no prefix dir)
        #   - Windows   .zip: `clap-validator.exe`       (no prefix dir)
        # Extract to a scratch dir, then flatten to ./clap-validator/<bin>.
        run: |
          mkdir -p clap-validator clap-validator-tmp
          curl -L -o "${{ matrix.clap_validator_archive }}" "${{ matrix.clap_validator_url }}"
          case "${{ matrix.clap_validator_archive }}" in
            *.zip)    unzip -oq "${{ matrix.clap_validator_archive }}" -d clap-validator-tmp ;;
            *.tar.gz) tar -xzf "${{ matrix.clap_validator_archive }}" -C clap-validator-tmp ;;
          esac
          if [ "$RUNNER_OS" = "Windows" ]; then
            src=$(find clap-validator-tmp -name clap-validator.exe -type f | head -1)
          else
            src=$(find clap-validator-tmp -name clap-validator -type f | head -1)
          fi
          [ -n "$src" ] || { echo "clap-validator binary not found in archive"; find clap-validator-tmp; exit 1; }
          cp "$src" "${{ matrix.clap_validator_bin }}"
          chmod +x "${{ matrix.clap_validator_bin }}" || true
          "${{ matrix.clap_validator_bin }}" --version

      # clap-validator is a pure-Rust headless validator; no display
      # server needed on Linux. --only-failed keeps logs concise.
      # Exit code is non-zero if any test fails.
      - name: clap-validator (CLAP)
        shell: bash
        run: ${{ matrix.clap_validator_bin }} validate --only-failed target/bundled/rack-plugin.clap

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: bundled-${{ matrix.runner }}
          path: target/bundled/
          retention-days: 7

  python:
    name: python / pluginrack CLI
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - name: sync + lint + test
        working-directory: pluginrack
        run: |
          uv sync --all-extras --group dev
          uv run ruff check src
          uv run pytest -q
          uv run pluginrack --help
